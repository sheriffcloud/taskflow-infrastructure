name: Infrastructure Pipeline

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      action:
        description: "Terraform action to run"
        required: true
        default: "plan"
        type: choice
        options:
          - plan
          - apply
          - destroy
          - install-lbc

env:
  TF_VERSION: "1.5.0"
  AWS_REGION: ${{ secrets.AWS_REGION }}
  TF_VAR_db_password: ${{ secrets.TF_VAR_DB_PASSWORD }}

jobs:
  terraform:
    name: Terraform ${{ github.event.inputs.action || 'plan' }}
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: terraform

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        if: github.event.inputs.action != 'install-lbc'
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Terraform Init
        if: github.event.inputs.action != 'install-lbc'
        run: terraform init -input=false

      - name: Terraform Format Check
        if: github.event.inputs.action != 'install-lbc'
        run: terraform fmt -check -recursive
        continue-on-error: true

      - name: Terraform Validate
        if: github.event.inputs.action != 'install-lbc'
        run: terraform validate

      - name: Terraform Plan
        if: |
          github.event.inputs.action == 'plan' ||
          github.event.inputs.action == '' ||
          github.event_name == 'push'
        run: terraform plan -input=false -lock-timeout=60s -out=tfplan

      - name: Show Plan Summary
        if: |
          github.event.inputs.action == 'plan' ||
          github.event.inputs.action == '' ||
          github.event_name == 'push'
        run: terraform show -no-color tfplan

      - name: Terraform Apply
        if: github.event.inputs.action == 'apply'
        run: |
          terraform plan -input=false -lock-timeout=60s -out=tfplan
          terraform apply -input=false -auto-approve tfplan

      - name: Save Terraform Outputs
        if: github.event.inputs.action == 'apply'
        run: |
          terraform output -json > terraform-outputs.json
          echo "Infrastructure outputs:"
          cat terraform-outputs.json

      - name: Configure kubectl
        if: |
          github.event.inputs.action == 'apply' ||
          github.event.inputs.action == 'install-lbc' ||
          github.event.inputs.action == 'destroy'
        working-directory: .
        continue-on-error: true
        run: |
          aws eks update-kubeconfig \
            --region ${{ secrets.AWS_REGION }} \
            --name taskflow-production-eks-cluster

      - name: Install AWS Load Balancer Controller
        if: |
          github.event.inputs.action == 'apply' ||
          github.event.inputs.action == 'install-lbc'
        working-directory: .
        run: |
          LBC_ROLE_ARN=$(aws iam get-role \
            --role-name taskflow-production-lbc-role \
            --query "Role.Arn" \
            --output text)

          echo "LBC Role ARN: $LBC_ROLE_ARN"

          curl https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
          helm repo add eks https://aws.github.io/eks-charts
          helm repo update

          helm upgrade --install aws-load-balancer-controller \
            eks/aws-load-balancer-controller \
            -n kube-system \
            --set clusterName=taskflow-production-eks-cluster \
            --set serviceAccount.create=true \
            --set serviceAccount.annotations."eks\.amazonaws\.com/role-arn"=$LBC_ROLE_ARN

          echo "Waiting for LBC to be ready..."
          sleep 30
          kubectl get pods -n kube-system | grep aws-load-balancer
          echo "LBC installed ✅"

      - name: Install ArgoCD
        if: |
          github.event.inputs.action == 'apply' ||
          github.event.inputs.action == 'install-lbc'
        working-directory: .
        run: |
          kubectl create namespace argocd 2>/dev/null || true
          kubectl apply -n argocd \
            --server-side \
            --force-conflicts \
            -f https://raw.githubusercontent.com/argoproj/argo-cd/stable/manifests/install.yaml

          echo "Waiting for ArgoCD to be ready..."
          kubectl wait --for=condition=available \
            deployment/argocd-server \
            -n argocd \
            --timeout=300s

          echo "ArgoCD installed ✅"

      - name: Configure ArgoCD Application
        if: |
          github.event.inputs.action == 'apply' ||
          github.event.inputs.action == 'install-lbc'
        working-directory: .
        run: |
          curl -sSL -o /usr/local/bin/argocd \
            https://github.com/argoproj/argo-cd/releases/latest/download/argocd-linux-amd64
          chmod +x /usr/local/bin/argocd

          ARGOCD_PASSWORD=$(kubectl -n argocd get secret \
            argocd-initial-admin-secret \
            -o jsonpath="{.data.password}" | base64 --decode)

          kubectl port-forward svc/argocd-server -n argocd 8080:443 &
          sleep 10

          argocd login localhost:8080 \
            --username admin \
            --password $ARGOCD_PASSWORD \
            --insecure

          argocd app create taskflow \
            --repo https://github.com/sheriffcloud/taskflow-k8s \
            --path . \
            --dest-server https://kubernetes.default.svc \
            --dest-namespace taskflow \
            --sync-policy automated \
            --self-heal \
            --auto-prune \
            --upsert

          echo "ArgoCD application created ✅"

      - name: Create Kubernetes Secrets
        if: |
          github.event.inputs.action == 'apply' ||
          github.event.inputs.action == 'install-lbc'
        working-directory: .
        run: |
          RDS_HOST=$(cd terraform && terraform output -raw rds_host)
          REDIS_ENDPOINT=$(cd terraform && terraform output -raw redis_endpoint)

          DATABASE_URL="postgres://taskflow_admin:${{ secrets.DB_PASSWORD }}@${RDS_HOST}:5432/taskflow?sslmode=no-verify"
          REDIS_URL="redis://${REDIS_ENDPOINT}:6379"

          kubectl create namespace taskflow 2>/dev/null || true

          kubectl create secret generic taskflow-secrets \
            -n taskflow \
            --from-literal=JWT_SECRET=${{ secrets.JWT_SECRET }} \
            --from-literal=DB_PASSWORD=${{ secrets.DB_PASSWORD }} \
            --from-literal=DATABASE_URL=$DATABASE_URL \
            --from-literal=REDIS_URL=$REDIS_URL \
            --dry-run=client -o yaml | kubectl apply -f -

          echo "Kubernetes secrets created ✅"

      - name: Wait for ALB and Update Route53
        if: |
          github.event.inputs.action == 'apply' ||
          github.event.inputs.action == 'install-lbc'
        working-directory: .
        run: |
          echo "Waiting for ArgoCD to sync and ALB to be created..."
          sleep 60

          kubectl port-forward svc/argocd-server -n argocd 8080:443 &
          sleep 5

          ARGOCD_PASSWORD=$(kubectl -n argocd get secret \
            argocd-initial-admin-secret \
            -o jsonpath="{.data.password}" | base64 --decode)

          argocd login localhost:8080 \
            --username admin \
            --password $ARGOCD_PASSWORD \
            --insecure

          argocd app sync taskflow
          sleep 30

          echo "Waiting for ALB DNS name..."
          for i in {1..30}; do
            ALB_DNS=$(kubectl get ingress taskflow-ingress \
              -n taskflow \
              -o jsonpath='{.status.loadBalancer.ingress[0].hostname}' \
              2>/dev/null)

            if [ -n "$ALB_DNS" ]; then
              echo "ALB DNS name: $ALB_DNS"
              break
            fi

            echo "Waiting... attempt $i/30"
            sleep 10
          done

          if [ -z "$ALB_DNS" ]; then
            echo "ALB not ready yet"
            echo "Run install-lbc action again to retry"
            exit 0
          fi

          cd terraform
          terraform init -input=false
          terraform apply -input=false -auto-approve \
            -var="alb_dns_name=$ALB_DNS"

          echo "Route53 updated: netforgetech.online → $ALB_DNS ✅"
        continue-on-error: true

      - name: Checkout taskflow-k8s
        if: github.event.inputs.action == 'destroy'
        uses: actions/checkout@v4
        with:
          repository: sheriffcloud/taskflow-k8s
          token: ${{ secrets.K8S_REPO_TOKEN }}
          path: k8s

      - name: Delete Kubernetes resources
        if: github.event.inputs.action == 'destroy'
        working-directory: .
        run: |
          echo "Deleting Kubernetes resources..."
          kubectl delete -f k8s/ingress.yaml --ignore-not-found=true
          echo "Waiting 60s for ALB deletion..."
          sleep 60
          kubectl delete secret taskflow-secrets \
            -n taskflow --ignore-not-found=true
          kubectl delete namespace taskflow \
            --ignore-not-found=true
          echo "Kubernetes resources deleted ✅"
        continue-on-error: true

      - name: Empty ECR repositories
        if: github.event.inputs.action == 'destroy'
        working-directory: .
        run: |
          echo "Emptying ECR repositories..."

          REPOS=(
            "taskflow-production-api-gateway"
            "taskflow-production-user-service"
            "taskflow-production-task-service"
            "taskflow-production-notification-service"
            "taskflow-production-frontend"
          )

          for REPO in "${REPOS[@]}"; do
            echo "Clearing $REPO..."
            IMAGES=$(aws ecr list-images \
              --repository-name $REPO \
              --region ${{ secrets.AWS_REGION }} \
              --query 'imageIds[*]' \
              --output json 2>/dev/null)

            if [ "$IMAGES" != "[]" ] && [ -n "$IMAGES" ]; then
              aws ecr batch-delete-image \
                --repository-name $REPO \
                --region ${{ secrets.AWS_REGION }} \
                --image-ids "$IMAGES"
              echo "Cleared $REPO ✅"
            else
              echo "$REPO already empty ✅"
            fi
          done

          echo "All ECR repositories emptied ✅"
        continue-on-error: true

      - name: Terraform Destroy
        if: github.event.inputs.action == 'destroy'
        run: terraform destroy -input=false -auto-approve