name: Infrastructure Pipeline

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      action:
        description: "Terraform action to run"
        required: true
        default: "plan"
        type: choice
        options:
          - plan
          - apply
          - destroy
          - install-lbc

env:
  TF_VERSION: "1.5.0"
  AWS_REGION: ${{ secrets.AWS_REGION }}
  TF_VAR_db_password: ${{ secrets.TF_VAR_DB_PASSWORD }}

jobs:
  terraform:
    name: Terraform ${{ github.event.inputs.action || 'plan' }}
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: terraform

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        if: github.event.inputs.action != 'install-lbc'
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Terraform Init
        if: github.event.inputs.action != 'install-lbc'
        run: terraform init -input=false

      - name: Terraform Format Check
        if: github.event.inputs.action != 'install-lbc'
        run: terraform fmt -check -recursive
        continue-on-error: true

      - name: Terraform Validate
        if: github.event.inputs.action != 'install-lbc'
        run: terraform validate

      - name: Terraform Plan
        if: |
          github.event.inputs.action == 'plan' ||
          github.event.inputs.action == '' ||
          github.event_name == 'push'
        run: terraform plan -input=false -lock-timeout=60s -out=tfplan

      - name: Show Plan Summary
        if: |
          github.event.inputs.action == 'plan' ||
          github.event.inputs.action == '' ||
          github.event_name == 'push'
        run: terraform show -no-color tfplan

      - name: Terraform Apply
        if: github.event.inputs.action == 'apply'
        run: |
          terraform plan -input=false -lock-timeout=60s -out=tfplan
          terraform apply -input=false -auto-approve tfplan

      - name: Save Terraform Outputs
        if: github.event.inputs.action == 'apply'
        run: |
          terraform output -json > terraform-outputs.json
          echo "Infrastructure outputs:"
          cat terraform-outputs.json

      - name: Configure kubectl
        if: |
          github.event.inputs.action == 'apply' ||
          github.event.inputs.action == 'install-lbc' ||
          github.event.inputs.action == 'destroy'
        working-directory: .
        run: |
          aws eks update-kubeconfig \
            --region ${{ secrets.AWS_REGION }} \
            --name taskflow-production-eks-cluster

      - name: Install AWS Load Balancer Controller
        if: |
          github.event.inputs.action == 'apply' ||
          github.event.inputs.action == 'install-lbc'
        working-directory: .
        run: |
          LBC_ROLE_ARN=$(cd terraform && terraform output -raw lbc_role_arn)
          curl https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
          helm repo add eks https://aws.github.io/eks-charts
          helm repo update
          helm install aws-load-balancer-controller eks/aws-load-balancer-controller \
            -n kube-system \
            --set clusterName=taskflow-production-eks-cluster \
            --set serviceAccount.create=true \
            --set serviceAccount.annotations."eks\.amazonaws\.com/role-arn"=$LBC_ROLE_ARN
          echo "LBC installed ✅"

      - name: Checkout taskflow-k8s
        if: github.event.inputs.action == 'destroy'
        uses: actions/checkout@v4
        with:
          repository: sheriffcloud/taskflow-k8s
          token: ${{ secrets.K8S_REPO_TOKEN }}
          path: k8s

      - name: Delete Kubernetes resources
        if: github.event.inputs.action == 'destroy'
        working-directory: .
        run: |
          echo "Deleting Kubernetes resources..."
          kubectl delete -f k8s/ingress.yaml --ignore-not-found=true
          echo "Waiting 60s for ALB deletion..."
          sleep 60
          kubectl delete secret taskflow-secrets \
            -n taskflow --ignore-not-found=true
          kubectl delete namespace taskflow --ignore-not-found=true
          echo "Kubernetes resources deleted ✅"
        continue-on-error: true

      - name: Terraform Destroy
        if: github.event.inputs.action == 'destroy'
        run: terraform destroy -input=false -auto-approve