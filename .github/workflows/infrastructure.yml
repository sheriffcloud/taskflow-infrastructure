name: Infrastructure Pipeline

on:
  push:
    branches: [main]
    # Runs terraform plan automatically on every push
    # Shows what WOULD change without applying

  workflow_dispatch:
    # Manual trigger from GitHub Actions UI
    # Allows you to choose what action to run
    inputs:
      action:
        description: "Terraform action to run"
        required: true
        default: "plan"
        type: choice
        options:
          - plan
          - apply
          - destroy

env:
  TF_VERSION: "1.5.0"
  AWS_REGION: ${{ secrets.AWS_REGION }}
  # TF_VAR_ prefix tells Terraform to use this as a variable
  # Replaces terraform.tfvars in the pipeline
  TF_VAR_db_password: ${{ secrets.TF_VAR_DB_PASSWORD }}

jobs:
  terraform:
    name: Terraform ${{ github.event.inputs.action || 'plan' }}
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: terraform
        # All run steps execute from terraform/ folder
        # No need to cd terraform in every step

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
        # Downloads and installs Terraform on the runner
        # Same as having terraform installed on your laptop

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Terraform Init
        run: terraform init
        # Downloads providers and connects to S3 backend
        # Same as running terraform init on your laptop

      - name: Terraform Format Check
        run: terraform fmt -check -recursive
        # Verifies all .tf files are properly formatted
        # Fails if any file needs formatting
        # Enforces consistent code style across the team
        continue-on-error: true
        # continue-on-error: true means pipeline continues
        # even if formatting check fails
        # We don't want to block deployments over formatting

      - name: Terraform Validate
        run: terraform validate
        # Checks that the configuration is syntactically valid
        # Catches errors before hitting the AWS API
        # Fast check — no AWS calls needed

      - name: Terraform Plan
        run: terraform plan -input=false -lock-timeout=60s -out=tfplan
        # Creates an execution plan
        # Shows exactly what will be created/changed/destroyed
        # Saves plan to file "tfplan" for apply step to use
        # -out ensures apply uses EXACTLY this plan
        # prevents drift between plan and apply

      - name: Show Plan Summary
        run: terraform show -no-color tfplan
        # Prints the plan in human readable format
        # Visible in GitHub Actions UI
        # Team can review what will change

      - name: Terraform Apply
        if: github.event.inputs.action == 'apply'
        run: terraform apply -auto-approve tfplan
        # Only runs when manually triggered with action=apply
        # -auto-approve skips the yes/no prompt
        # Uses the saved plan from previous step
        # Ensures what gets applied matches what was reviewed

      - name: Terraform Destroy
        if: github.event.inputs.action == 'destroy'
        run: terraform destroy -auto-approve
        # Only runs when manually triggered with action=destroy
        # Destroys ALL infrastructure
        # Use with extreme caution in production

      - name: Save Terraform Outputs
        if: github.event.inputs.action == 'apply'
        run: |
          terraform output -json > terraform-outputs.json
          echo "Infrastructure outputs:"
          cat terraform-outputs.json
        # Saves all terraform outputs to a JSON file
        # Shows them in the pipeline logs
        # Useful for debugging and verification